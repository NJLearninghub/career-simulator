<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Career Path Simulator — Science Stream Gujarat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a;
    --bg2: #111827;
    --bg3: #1a2035;
    --gold: #f0c060;
    --gold2: #e8a830;
    --teal: #38bdf8;
    --mint: #34d399;
    --rose: #fb7185;
    --purple: #a78bfa;
    --text: #e8edf5;
    --muted: #8896b0;
    --border: rgba(240,192,96,0.18);
    --card-bg: rgba(26,32,53,0.85);
    --card-hover: rgba(36,44,72,0.95);
    --radius: 14px;
    --trans: 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  #stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 30%, #1a1f3a 0%, #0b0f1a 60%);
  }
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle var(--d, 3s) var(--delay, 0s) infinite alternate;
  }
  @keyframes twinkle { from{opacity:0.1} to{opacity:0.85} }
  .shell {
    position: relative; z-index: 1;
    max-width: 960px; margin: 0 auto;
    padding: 32px 20px 80px;
    min-height: 100vh;
  }
  header { text-align: center; margin-bottom: 40px; }
  header .eyebrow {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); font-weight: 600; margin-bottom: 10px;
  }
  header h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700; line-height: 1.15;
    background: linear-gradient(135deg, var(--gold) 0%, #fff8e7 50%, var(--gold2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  header p { color: var(--muted); font-size: 15px; max-width: 540px; margin: 0 auto; }
  #trail {
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 6px; min-height: 36px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 6px 16px;
    margin-bottom: 32px;
    font-size: 12px;
  }
  .crumb {
    display: flex; align-items: center; gap: 4px;
    color: var(--muted); transition: color var(--trans); cursor: default;
  }
  .crumb.active { color: var(--gold); font-weight: 600; }
  .crumb-arrow { color: var(--border); font-size: 16px; }
  .crumb-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 12px; font-family: inherit;
    padding: 0; transition: color var(--trans);
  }
  .crumb-btn:hover { color: var(--gold); }
  #trail-empty { color: var(--muted); font-size: 12px; font-style: italic; }
  #question-wrap { margin-bottom: 28px; }
  #question-label {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--teal); font-weight: 600; margin-bottom: 8px;
  }
  #question-text {
    font-family: 'Fraunces', serif;
    font-size: clamp(20px, 3.5vw, 30px);
    font-weight: 600; line-height: 1.3; color: var(--text);
  }
  #question-sub { margin-top: 6px; color: var(--muted); font-size: 13.5px; line-height: 1.5; }
  #cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px; margin-bottom: 32px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 18px 16px;
    cursor: pointer;
    transition: all var(--trans);
    position: relative; overflow: hidden;
    animation: cardIn 0.4s var(--ai, 0s) both;
    backdrop-filter: blur(6px);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card::before {
    content: ''; position: absolute; inset: 0; opacity: 0;
    background: linear-gradient(135deg, rgba(240,192,96,0.08) 0%, transparent 60%);
    transition: opacity var(--trans);
  }
  .card:hover::before { opacity: 1; }
  .card:hover {
    background: var(--card-hover);
    border-color: rgba(240,192,96,0.45);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(240,192,96,0.2);
  }
  .card-icon { font-size: 28px; margin-bottom: 10px; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
  .card-label { font-weight: 600; font-size: 14.5px; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
  .card-sub { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .card-tag {
    display: inline-block; margin-top: 8px;
    font-size: 10px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; padding: 2px 8px;
    border-radius: 20px; border: 1px solid;
  }
  .tag-sci     { color: var(--teal);   border-color: rgba(56,189,248,0.35);  background: rgba(56,189,248,0.08); }
  .tag-arts    { color: var(--purple); border-color: rgba(167,139,250,0.35); background: rgba(167,139,250,0.08); }
  .tag-comm    { color: var(--mint);   border-color: rgba(52,211,153,0.35);  background: rgba(52,211,153,0.08); }
  .tag-prof    { color: var(--gold);   border-color: rgba(240,192,96,0.35);  background: rgba(240,192,96,0.08); }
  .tag-med     { color: var(--rose);   border-color: rgba(251,113,133,0.35); background: rgba(251,113,133,0.08); }
  .tag-creator { color: #f472b6;       border-color: rgba(244,114,182,0.35); background: rgba(244,114,182,0.08); }
  #back-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: inherit; font-size: 13px;
    padding: 8px 18px; border-radius: 30px; cursor: pointer;
    transition: all var(--trans); display: none; align-items: center; gap: 6px;
  }
  #back-btn:hover { border-color: var(--gold); color: var(--gold); }
  #back-btn.visible { display: flex; }
  #outcome { display: none; animation: fadeSlide 0.5s both; }
  @keyframes fadeSlide { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }
  .outcome-hero {
    background: linear-gradient(135deg, #1a2035 0%, #0f1628 100%);
    border: 1px solid var(--border); border-radius: 18px; padding: 28px;
    margin-bottom: 20px; position: relative; overflow: hidden;
  }
  .outcome-hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at top left, rgba(240,192,96,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .outcome-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(240,192,96,0.12); border: 1px solid rgba(240,192,96,0.3);
    border-radius: 30px; padding: 5px 14px;
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--gold); margin-bottom: 14px;
  }
  .creator-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(251,113,133,0.12); border: 1px solid rgba(251,113,133,0.35);
    border-radius: 30px; padding: 4px 14px; margin-bottom: 14px;
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--rose);
  }
  .outcome-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(22px, 4vw, 34px); font-weight: 700; color: var(--text);
    margin-bottom: 8px; line-height: 1.2;
  }
  .outcome-desc { color: var(--muted); font-size: 14px; line-height: 1.65; max-width: 680px; }
  .path-replay { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-top: 18px; }
  .path-chip {
    font-size: 11.5px; padding: 4px 12px; border-radius: 20px; font-weight: 600;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--muted);
  }
  .path-arrow { color: var(--gold); font-size: 14px; }
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; text-align: center;
    transition: all var(--trans);
  }
  .stat-card:hover { border-color: rgba(240,192,96,0.4); transform: translateY(-2px); }
  .stat-icon { font-size: 24px; margin-bottom: 6px; }
  .stat-val {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700;
    color: var(--gold); margin-bottom: 3px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .sat-bar-wrap { margin-top: 6px; }
  .sat-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 4px; }
  .sat-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--mint), var(--teal)); transition: width 1.2s cubic-bezier(0.4,0,0.2,1); }
  .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media(max-width: 600px) { .section-grid { grid-template-columns: 1fr; } }
  .info-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .info-card-title {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .info-card-title .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .job-chip {
    display: flex; align-items: flex-start; gap: 10px; padding: 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: var(--text);
  }
  .job-chip:last-child { border-bottom: none; }
  .job-dot { color: var(--gold); margin-top: 3px; flex-shrink: 0; }
  .job-info { display: flex; flex-direction: column; }
  .job-name { font-weight: 600; font-size: 13px; }
  .job-sal { font-size: 11px; color: var(--mint); margin-top: 1px; }
  .trend-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: var(--muted); line-height: 1.4;
  }
  .trend-item:last-child { border-bottom: none; }
  .trend-arrow { color: var(--mint); flex-shrink: 0; font-size: 15px; margin-top: 1px; }
  .ai-insight {
    background: linear-gradient(135deg, rgba(167,139,250,0.08) 0%, rgba(56,189,248,0.06) 100%);
    border: 1px solid rgba(167,139,250,0.2); border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
  }
  .ai-insight-title {
    font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--purple); display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .ai-insight p { font-size: 13.5px; color: var(--muted); line-height: 1.7; }
  .risk-panel {
    background: linear-gradient(135deg, rgba(251,113,133,0.07) 0%, rgba(212,130,10,0.05) 100%);
    border: 1px solid rgba(251,113,133,0.25); border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
  }
  .risk-panel-title {
    font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--rose); display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
  }
  .risk-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; line-height: 1.5;
  }
  .risk-item:last-child { margin-bottom: 0; }
  .risk-critical { background: rgba(251,113,133,0.12); border-left: 3px solid #fb7185; }
  .risk-high     { background: rgba(251,146,60,0.12);  border-left: 3px solid #fb923c; }
  .risk-medium   { background: rgba(251,191,36,0.10);  border-left: 3px solid #fbbf24; }
  .risk-icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
  .risk-text { color: var(--text); }
  .risk-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-right: 6px; }
  .risk-label-critical { color: #fb7185; }
  .risk-label-high     { color: #fb923c; }
  .risk-label-medium   { color: #fbbf24; }
  .skills-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .skill-pill {
    font-size: 12px; padding: 5px 13px; border-radius: 20px; font-weight: 500;
    background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.25); color: var(--teal);
  }
  .salary-meter { margin-top: 8px; }
  .salary-range { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .salary-bar { height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; position: relative; }
  .salary-fill {
    position: absolute; left: 0; top: 0; height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, #f0c060, #38bdf8); transition: width 1.4s cubic-bezier(0.4,0,0.2,1);
  }
  .salary-avg { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; color: var(--gold); margin-top: 6px; }
  .salary-note { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .action-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #0b0f1a; font-family: inherit; font-weight: 700; font-size: 14px;
    padding: 12px 28px; border: none; border-radius: 40px; cursor: pointer;
    transition: all var(--trans); box-shadow: 0 4px 20px rgba(240,192,96,0.25);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(240,192,96,0.4); }
  .btn-sec {
    background: none; color: var(--muted); font-family: inherit; font-size: 14px;
    padding: 12px 24px; border: 1px solid var(--border); border-radius: 40px;
    cursor: pointer; transition: all var(--trans); font-weight: 500;
  }
  .btn-sec:hover { border-color: var(--gold); color: var(--gold); }
  .loading-spinner {
    display: flex; align-items: center; justify-content: center;
    padding: 60px; color: var(--muted); font-size: 14px; gap: 12px;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media(max-width: 500px) {
    #cards { grid-template-columns: 1fr; }
    .section-grid { grid-template-columns: 1fr; }
  }


  /* ═══════ Language Toggle ═══════ */
  .lang-toggle {
    position: absolute; top: 18px; right: 20px;
    display: inline-flex; align-items: center; gap: 0;
    background: rgba(26,32,53,0.85); border: 1px solid var(--border);
    border-radius: 24px; padding: 3px; font-size: 12px;
    backdrop-filter: blur(8px); z-index: 10;
  }
  .lang-btn {
    background: none; border: none; cursor: pointer; font-family: inherit;
    color: var(--muted); padding: 6px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
    transition: all var(--trans);
  }
  .lang-btn.active {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #0b0f1a; box-shadow: 0 2px 8px rgba(240,192,96,0.3);
  }
  .lang-btn:not(.active):hover { color: var(--gold); }
  @media print { .lang-toggle { display: none !important; } }

  /* ═══════ PRINT / SAVE AS PDF STYLES ═══════ */
  @media print {
    *, *::before, *::after {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }
    body { background: #fff !important; color: #1a1a1a !important; }
    #stars, .star, #back-btn, #simulator, #trail, header,
    .action-row, .btn-primary, .btn-sec { display: none !important; }
    .shell { max-width: 100%; padding: 0 20px; }
    #outcome { display: block !important; animation: none !important; }

    .outcome-hero {
      background: #f0f4fa !important; border: 2px solid #1a3c6e !important;
      padding: 20px !important; page-break-inside: avoid;
    }
    .outcome-hero::before { display: none !important; }
    .outcome-badge { background: #1a3c6e !important; color: #fff !important; border: none !important; }
    .creator-badge { background: #8B1A2E !important; color: #fff !important; border: none !important; }
    .outcome-title { color: #1a3c6e !important; font-size: 24pt !important; -webkit-text-fill-color: #1a3c6e !important; }
    .outcome-desc { color: #333 !important; font-size: 11pt !important; }
    .path-chip { background: #e8edf5 !important; border: 1px solid #ccc !important; color: #333 !important; }
    .path-arrow { color: #1a3c6e !important; }

    .stats-row { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 8px !important; }
    .stat-card { background: #f8f9fb !important; border: 1px solid #d0d8e4 !important; padding: 12px !important; page-break-inside: avoid; }
    .stat-val { color: #1a3c6e !important; font-size: 13pt !important; -webkit-text-fill-color: #1a3c6e !important; }
    .stat-label { color: #555 !important; }
    .sat-bar { background: #e0e0e0 !important; }
    .sat-fill { background: #1a6e5a !important; }

    .info-card { background: #fafbfd !important; border: 1px solid #d0d8e4 !important; page-break-inside: avoid; }
    .info-card-title span { color: #1a3c6e !important; }
    .section-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 10px !important; }

    .job-chip { border-bottom: 1px solid #eee !important; }
    .job-name { color: #1a1a1a !important; }
    .job-sal { color: #1a6e5a !important; }
    .job-dot { color: #d4820a !important; }
    .trend-item { border-bottom: 1px solid #eee !important; color: #333 !important; }
    .trend-arrow { color: #1a6e5a !important; }

    .ai-insight { background: #f3f0ff !important; border: 1px solid #a78bfa !important; page-break-inside: avoid; }
    .ai-insight-title { color: #5B2A8E !important; }
    .ai-insight p { color: #333 !important; }

    .skill-pill { background: #e6f4ff !important; border: 1px solid #80c4e8 !important; color: #1a5276 !important; }

    .salary-avg { color: #1a3c6e !important; font-size: 18pt !important; -webkit-text-fill-color: #1a3c6e !important; }
    .salary-note { color: #555 !important; }
    .salary-bar { background: #e0e0e0 !important; }
    .salary-fill { background: linear-gradient(90deg, #d4820a, #2E7D9F) !important; }
    .salary-range { color: #555 !important; }

    .risk-panel { background: #fdf0f2 !important; border: 2px solid #fb7185 !important; page-break-inside: avoid; }
    .risk-panel-title { color: #8B1A2E !important; }
    .risk-item { page-break-inside: avoid; }
    .risk-critical { background: #fde8ec !important; border-left: 4px solid #e11d48 !important; }
    .risk-high     { background: #fef3e2 !important; border-left: 4px solid #ea580c !important; }
    .risk-medium   { background: #fefce8 !important; border-left: 4px solid #ca8a04 !important; }
    .risk-text { color: #1a1a1a !important; }
    .risk-label-critical { color: #e11d48 !important; }
    .risk-label-high     { color: #ea580c !important; }
    .risk-label-medium   { color: #ca8a04 !important; }

    #outcome::before {
      content: "Career Path Simulator — Gujarat Science Stream";
      display: block; text-align: center;
      font-size: 9pt; color: #888; padding-bottom: 12px;
      border-bottom: 1px solid #ddd; margin-bottom: 16px;
    }
  }
</style>
</head>
<body>

<div id="stars"></div>

<div class="shell" style="position:relative">
  <div class="lang-toggle">
    <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="lang-gu" onclick="setLang('gu')">ગુજરાતી</button>
  </div>
  <header>
    <div class="eyebrow" id="ui-eyebrow" style="font-size:14px; padding:6px 0 8px;">✦ Interactive Career Simulator ✦</div>
  </header>

  <div id="trail"><span id="trail-empty">Your journey begins here →</span></div>
  <button id="back-btn" onclick="goBack()"><span id="back-label">← Back</span></button>

  <div id="simulator">
    <div id="question-wrap">
      <div id="question-label">Step 1</div>
      <div id="question-text">Where are you right now?</div>
      <div id="question-sub">Select your current academic level to begin exploring career paths.</div>
    </div>
    <div id="cards"></div>
  </div>

  <div id="outcome"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG — ZERO DATA IN THIS FILE

const API_BASE = window.location.origin;
const API_KEY = 'cps_2025_guj_science_v1';

async function apiCall(endpoint, params) {
  const url = new URL(endpoint, API_BASE);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url, {
    headers: { 'x-api-key': API_KEY }
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

function t(k) { return UI[lang][k] || UI.en[k] || ''; }

function applyStaticUI() {
  const u = UI[lang];
  document.getElementById('ui-eyebrow').textContent = u.eyebrow;
  const bl = document.getElementById('back-label'); if (bl) bl.textContent = u.back;
  const te = document.getElementById('trail-empty'); if (te) te.textContent = u.trailEmpty;
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-gu').classList.toggle('active', lang === 'gu');
  document.documentElement.lang = lang;
}

function setLang(newLang) {
  if (newLang === lang) return;
  lang = newLang;
  applyStaticUI();
  const outVisible = document.getElementById('outcome').style.display === 'block';
  if (outVisible && lastOutcomeKey) {
    showOutcome(lastOutcomeKey);
  } else {
    renderStep(current);
  }
}


// ═══════════════════════════════════════════════════════════════
//  STARS
// ═══════════════════════════════════════════════════════════════
function initStars() {
  const el = document.getElementById('stars');
  for (let i = 0; i < 160; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${sz}px;height:${sz}px;
      top:${Math.random()*100}%;left:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      --delay:${(Math.random()*4).toFixed(1)}s;
      opacity:${Math.random()*0.5+0.1};
    `;
    el.appendChild(s);
  }
}

// ═══════════════════════════════════════════════════════════════
//  TRAIL
// ═══════════════════════════════════════════════════════════════
function renderTrail() {
  const trail = document.getElementById('trail');
  const empty = document.getElementById('trail-empty');
  if (history.length === 0) {
    empty.style.display = '';
    trail.querySelectorAll('.crumb, .crumb-arrow').forEach(e => e.remove());
    return;
  }
  empty.style.display = 'none';
  trail.querySelectorAll('.crumb, .crumb-arrow').forEach(e => e.remove());
  history.forEach((h, i) => {
    if (i > 0) {
      const arr = document.createElement('span');
      arr.className = 'crumb-arrow'; arr.textContent = '›';
      trail.appendChild(arr);
    }
    const c = document.createElement('div');
    c.className = 'crumb' + (i === history.length - 1 ? ' active' : '');
    if (i < history.length - 1) {
      c.innerHTML = `<button class="crumb-btn" onclick="goToHistory(${i})">${h.icon} ${h.label}</button>`;
    } else {
      c.innerHTML = `<span>${h.icon} ${h.label}</span>`;
    }
    trail.appendChild(c);
  });
}

// ═══════════════════════════════════════════════════════════════
//  SHOW LOADING
// ═══════════════════════════════════════════════════════════════
function showLoading(target) {
  const el = typeof target === 'string' ? document.getElementById(target) : target;
  el.innerHTML = `<div class="loading-spinner"><div class="spinner"></div>${t("loading")}</div>`;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER STEP — fetches from API
// ═══════════════════════════════════════════════════════════════
async function renderStep(nodeId) {
  document.getElementById('outcome').style.display = 'none';
  document.getElementById('simulator').style.display = '';

  const grid = document.getElementById('cards');
  showLoading(grid);

  try {
    const data = await apiCall('/api/tree', { node: nodeId, lang: lang });

    // Handle outcome redirect
    if (data.type === 'outcome') {
      showOutcome(data.key);
      return;
    }

    document.getElementById('question-label').textContent = data.label || `${t("step")} ${history.length + 1}`;
    document.getElementById('question-text').textContent = data.q;
    document.getElementById('question-sub').textContent = data.sub || '';

    grid.innerHTML = '';
    data.opts.forEach((opt, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--ai', `${i * 0.06}s`);
      card.innerHTML = `
        <span class="card-icon">${opt.icon}</span>
        <div class="card-label">${opt.label}</div>
        ${opt.sub ? `<div class="card-sub">${opt.sub}</div>` : ''}
        ${opt.tag ? `<span class="card-tag ${opt.tag}">${opt.tag.replace('tag-','')}</span>` : ''}
      `;
      card.onclick = () => selectOption(nodeId, opt);
      grid.appendChild(card);
    });

    const bb = document.getElementById('back-btn');
    if (history.length > 0) bb.classList.add('visible');
    else bb.classList.remove('visible');

  } catch (err) {
    grid.innerHTML = `<div class="loading-spinner" style="color:var(--rose)">${t("errLoad")}</div>`;
  }
}

function selectOption(fromId, opt) {
  history.push({ nodeId: fromId, label: opt.label, icon: opt.icon });
  current = opt.next;
  renderTrail();
  renderStep(opt.next);
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  current = prev.nodeId;
  renderTrail();
  document.getElementById('outcome').style.display = 'none';
  document.getElementById('simulator').style.display = '';
  renderStep(prev.nodeId);
}

function goToHistory(idx) {
  const target = history[idx].nodeId;
  history = history.slice(0, idx);
  current = target;
  renderTrail();
  document.getElementById('outcome').style.display = 'none';
  document.getElementById('simulator').style.display = '';
  renderStep(target);
}

function restart() {
  history = [];
  current = 'root';
  renderTrail();
  document.getElementById('outcome').style.display = 'none';
  document.getElementById('simulator').style.display = '';
  renderStep('root');
}
